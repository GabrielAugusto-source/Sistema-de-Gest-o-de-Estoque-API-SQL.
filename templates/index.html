<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SGE - Gestão de Estoque</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Gestor de Estoque</h1>

        
        <section class="form-section">
            <h2>Cadastrar Novo Produto</h2>
            <form id="product-form">
                <input type="text" id="name" placeholder="Nome do Produto" required>
                <input type="number" id="quantity" placeholder="Quantidade" required>
                <input type="number" step="0.01" id="price" placeholder="Preço (ex: 10.50)" required>
                <input type="number" id="category_id" placeholder="ID da Categoria" required>
                <input type="number" id="supplier_id" placeholder="ID do Fornecedor" required>
                <button type="submit">Salvar Produto</button>
            </form>
        </section>

        <hr>

        
        <section class="list-section">
            <h2>Produtos em Estoque</h2>
            <table id="product-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Qtd</th>
                        <th>Preço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                
                </tbody>
            </table>
        </section>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
